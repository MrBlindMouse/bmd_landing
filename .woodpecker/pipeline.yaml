when:
  event: [push, pull_request]
  branch: [main]

steps:
  minify:
    image: node:20-alpine
    commands:
      - npm install -g terser
      - terser static/js/webgl-fluid.js -o static/js/webgl-fluid.min.js -c -m

  deploy:
    image: alpine:3.21
    volumes:
      - /var/www/bmd_landing:/target
    commands:
      - apk add --no-cache rsync
      - rsync -av --delete . /target/
      - echo "Deployed at $(date -u)"